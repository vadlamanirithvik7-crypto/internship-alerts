services:
  - type: web
    name: internship-alerts
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false # set in the Render dashboard to your Supabase connection string
      - key: PYTHON_VERSION
        value: "3.12.7"
